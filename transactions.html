<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — Nguyen Finance</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>

<div class="page">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <h1>Transactions</h1>
      <p id="countLabel">Loading…</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="totalLabel" style="font-weight:700;font-size:18px;color:var(--teal-dark)"></span>
      <button onclick="downloadCSV()" class="btn btn-secondary btn-sm">⬇ Download CSV</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input id="filterSearch" type="text" class="form-control" placeholder="Search…">
    <input id="filterFrom" type="date" class="form-control" title="From date">
    <input id="filterTo"   type="date" class="form-control" title="To date">
    <select id="filterCategory" class="form-control"><option value="">All categories</option></select>
    <select id="filterWho" class="form-control">
      <option value="">Edison + Grace</option>
      <option value="edison">Edison only</option>
    </select>
  </div>

  <div id="loading" style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>

  <div class="card" id="tableWrap" style="display:none;padding:0;overflow:hidden">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Category</th>
            <th>Source</th>
            <th style="text-align:right">Amount</th>
            <th style="text-align:center">Actions</th>
          </tr>
        </thead>
        <tbody id="txnBody"></tbody>
      </table>
    </div>
  </div>
</div>

<button class="fab" onclick="window.location.href='upload.html'" title="Upload statement">⬆</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>
</body>
</html>
